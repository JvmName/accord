name: Android Release

on:
  push:
    branches: [main]
    paths:
      - 'app/gradle.properties'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      exists: ${{ steps.check_release.outputs.exists }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic

      - name: Extract versionName
        id: version
        run: |
          VERSION=$(grep '^VERSION_NAME=' app/gradle.properties | cut -d'=' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Check if release already exists
        id: check_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "client-${{ steps.version.outputs.version }}" > /dev/null 2>&1; then
            echo "Release client-${{ steps.version.outputs.version }} already exists — skipping."
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Decode keystore
        if: steps.check_release.outputs.exists == 'false'
        run: |
          echo "${{ secrets.SIGNING_KEYSTORE_BASE64 }}" | base64 -d > app/androidApp/AccordProdKey.jks

      - name: Make gradlew executable
        if: steps.check_release.outputs.exists == 'false'
        run: chmod +x app/gradlew

      - name: Build APK and wasm distribution
        if: steps.check_release.outputs.exists == 'false'
        working-directory: app
        env:
          SIGNING_STORE_FILE: AccordProdKey.jks
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew :androidApp:assembleRelease -Prelease :shared:wasmJsBrowserDistribution

      - name: Locate and rename APK
        if: steps.check_release.outputs.exists == 'false'
        id: apk
        run: |
          APK=$(find app/androidApp/build/outputs/apk/release -name "*.apk" | head -1)
          VERSIONED="app/androidApp/build/outputs/apk/release/accord-${{ steps.version.outputs.version }}.apk"
          mv "$APK" "$VERSIONED"
          echo "path=$VERSIONED" >> $GITHUB_OUTPUT

      - name: Upload APK artifact
        if: steps.check_release.outputs.exists == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: ${{ steps.apk.outputs.path }}
          retention-days: 1

      - name: Prepare wasm deployment bundle
        if: steps.check_release.outputs.exists == 'false'
        run: |
          cp app/shared/railway.web.json app/shared/build/dist/wasmJs/productionExecutable/railway.json
          cp app/shared/Staticfile.web app/shared/build/dist/wasmJs/productionExecutable/Staticfile
          cp app/shared/Caddyfile.web app/shared/build/dist/wasmJs/productionExecutable/Caddyfile.override

      - name: Upload wasm artifact
        if: steps.check_release.outputs.exists == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: wasm-dist
          path: app/shared/build/dist/wasmJs/productionExecutable/
          retention-days: 1

  release-android:
    needs: build
    if: needs.build.outputs.exists == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: release-apk
          path: release-apk

      - name: Compute release notes
        id: notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PREV=$(gh release list --limit 50 --json tagName --jq '[.[] | select(.tagName | startswith("client-"))] | first | .tagName // ""')
          if [ -n "$PREV" ]; then
            NOTES=$(git log "${PREV}..HEAD" --oneline -- app/)
          else
            NOTES=$(git log --oneline -- app/)
          fi
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRERELEASE_FLAG=""
          if [[ "${{ needs.build.outputs.version }}" == *-* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "client-${{ needs.build.outputs.version }}" \
            --title "Client ${{ needs.build.outputs.version }}" \
            --notes "${{ steps.notes.outputs.notes }}" \
            $PRERELEASE_FLAG \
            release-apk/accord-${{ needs.build.outputs.version }}.apk

  web-deploy:
    needs: build
    if: needs.build.outputs.exists == 'false'
    runs-on: ubuntu-latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

    steps:
      - name: Download wasm distribution
        uses: actions/download-artifact@v4
        with:
          name: wasm-dist
          path: wasm-dist

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy to Railway
        working-directory: wasm-dist
        run: railway up --service=${{ secrets.RAILWAY_WEB_SERVICE_ID }} --detach
