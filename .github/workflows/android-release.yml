name: Android Release

on:
  push:
    branches: [main]
    paths:
      - 'app/androidApp/build.gradle.kts'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      exists: ${{ steps.check_release.outputs.exists }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Extract versionName
        id: version
        run: |
          VERSION=$(grep 'versionName = ' app/androidApp/build.gradle.kts | grep -oP '"\K[^"]+')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Check if release already exists
        id: check_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "client-${{ steps.version.outputs.version }}" > /dev/null 2>&1; then
            echo "Release client-${{ steps.version.outputs.version }} already exists — skipping."
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Decode keystore
        if: steps.check_release.outputs.exists == 'false'
        run: |
          echo "${{ secrets.SIGNING_KEYSTORE_BASE64 }}" | base64 -d > app/androidApp/AccordProdKey.jks

      - name: Make gradlew executable
        if: steps.check_release.outputs.exists == 'false'
        run: chmod +x app/gradlew

      - name: Build release APK
        if: steps.check_release.outputs.exists == 'false'
        working-directory: app
        env:
          SIGNING_STORE_FILE: AccordProdKey.jks
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew :androidApp:assembleRelease -Prelease

      - name: Locate and rename APK
        if: steps.check_release.outputs.exists == 'false'
        id: apk
        run: |
          APK=$(find app/androidApp/build/outputs/apk/release -name "*.apk" | head -1)
          VERSIONED="app/androidApp/build/outputs/apk/release/accord-${{ steps.version.outputs.version }}.apk"
          mv "$APK" "$VERSIONED"
          echo "path=$VERSIONED" >> $GITHUB_OUTPUT

      - name: Compute release notes
        if: steps.check_release.outputs.exists == 'false'
        id: notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PREV=$(gh release list --limit 50 --json tagName --jq '[.[] | select(.tagName | startswith("client-"))] | first | .tagName // ""')
          if [ -n "$PREV" ]; then
            NOTES=$(git log "${PREV}..HEAD" --oneline -- app/)
          else
            NOTES=$(git log --oneline -- app/)
          fi
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: steps.check_release.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRERELEASE_FLAG=""
          if [[ "${{ steps.version.outputs.version }}" == *-* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "client-${{ steps.version.outputs.version }}" \
            --title "Client ${{ steps.version.outputs.version }}" \
            --notes "${{ steps.notes.outputs.notes }}" \
            $PRERELEASE_FLAG \
            ${{ steps.apk.outputs.path }}

  web-deploy:
    needs: release
    if: needs.release.outputs.exists == 'false'
    runs-on: ubuntu-latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Make gradlew executable
        run: chmod +x app/gradlew

      - name: Build wasm distribution
        working-directory: app
        run: ./gradlew :shared:wasmJsBrowserDistribution

      - name: Copy Railway config to build output
        run: |
          cp app/shared/railway.web.json app/shared/build/dist/wasmJs/productionExecutable/railway.json
          cp app/shared/Staticfile.web app/shared/build/dist/wasmJs/productionExecutable/Staticfile

      - name: Deploy to Railway
        working-directory: app/shared/build/dist/wasmJs/productionExecutable
        run: railway up --service=${{ secrets.RAILWAY_WEB_SERVICE_ID }} --ci
